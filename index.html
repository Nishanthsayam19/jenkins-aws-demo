<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Project</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;

            /* DevOps Background Image */
            background-image:url("https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920&auto=format&fit=crop");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        /* Dark overlay */
        body::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.55);
        }

        .container{
            position:relative;
            z-index:1;
            color:white;
            padding:40px;
        }

        h1{
            font-size:60px;
            margin-bottom:20px;
            text-shadow:3px 3px 8px black;
        }

        h2{
            font-size:30px;
            margin-bottom:20px;
            color:#00ffcc;
        }

        p{
            font-size:22px;
        }

        .btn{
            margin-top:30px;
            padding:15px 35px;
            background:#ff9800;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:20px;
            transition:.3s;
        }

        .btn:hover{
            background:#ff5722;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to My DevOps Project</h1>
    <h2>GitHub → Jenkins → AWS EC2</h2>

    <p>
        Continuous Integration & Continuous Deployment Demo
    </p>

    <a href="#" class="btn">Deployment Successful</a>
</div>

</body>
</html>
